<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>topografiko</title>
    <script>
      (function () {
        var path = window.location.pathname.replace(/^\/topografiko/, '');
        var search = window.location.search || '';
        var hash = window.location.hash || '';
        var target = '/topografiko/?redirect=' + encodeURIComponent(path + search + hash);
        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
